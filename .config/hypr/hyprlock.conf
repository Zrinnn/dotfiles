}

label {
    monitor =
    text = cmd[update:1000] echo "$(/home/zrin/scripts/songdetail.sh)" 
    color = rgba(147, 196, 255, 1)
    font_size = 10
    font_family = JetBrains Mono Nerd, SF Pro Display Bold
    position = 0, 50
    halign = center
